<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Mandarin Learning Center</title>
   <style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        text-align: center; 
        padding: 50px; 
        background-color: #f4f7f6;
    }
    ul { list-style: none; padding: 0; }
    li { margin: 20px 0; }

    /* This makes all buttons uniform */
    .btn { 
        display: inline-block;
        width: 200px;           /* Fixed width for all buttons */
        padding: 15px 0;        /* Vertical padding */
        text-decoration: none; 
        background-color: #007bff; 
        color: white; 
        font-weight: bold;
        border-radius: 8px; 
        transition: background 0.3s, transform 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn:hover { 
        background-color: #0056b3; 
        transform: translateY(-2px); /* Slight lift effect */
    }
</style>
</head>
<body>
    <h1>Mandarin Flashcards</h1>
    <p>Select a lesson to begin practicing:</p>
    
   <ul>
    <li><a class="btn" href="Lesson1/">Lesson 1</a></li>
    <li><a class="btn" href="Lesson2/">Lesson 2</a></li>
    <li><a class="btn" href="Lesson3/">Lesson 3</a></li>
    <li><a class="btn" href="Lesson4/">Lesson 4</a></li>
    <li><a class="btn" href="Lesson5/">Lesson 5</a></li>
    <li><a class="btn" href="Lesson6/">Lesson 6</a></li>
</ul>
</body>
</html>
